<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus Finder</title>
  <style>
    body { font-family: -apple-system; text-align: center; padding: 20px; }
    button {
      font-size: 18px;
      padding: 15px;
      margin: 10px;
      width: 90%;
    }
    .bus {
      margin-top: 15px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

<h2>Bus Finder</h2>

<button onclick="start('lougheed')">Lougheed Mall Bus Station</button>
<button onclick="start('burquitlam')">Burquitlam Station</button>
<button onclick="start('regent')">842 Regent St (Eastbound)</button>

<div id="results">Select a destination</div>

<script>
const API_KEY = "h2kQJcW1liXq6pSOQpLn";

// Destination filters
const DEST_FILTERS = {
  lougheed: {
    keywords: ["lougheed"],
    directions: ["W"]
  },
  burquitlam: {
    keywords: ["burquitlam"],
    directions: ["W", "N"]
  },
  regent: {
    keywords: ["coquitlam", "regent"],
    directions: ["E"]
  }
};

// Fixed stop for Regent
const FIXED_STOPS = {
  regent: "52813"
};

let refreshInterval = null;

function start(destinationKey) {
  clearInterval(refreshInterval);
  document.getElementById("results").innerHTML = "Loading...";

  // Use fixed stop if defined
  if (FIXED_STOPS[destinationKey]) {
    fetchBuses(FIXED_STOPS[destinationKey], destinationKey);
    refreshInterval = setInterval(() => {
      fetchBuses(FIXED_STOPS[destinationKey], destinationKey);
    }, 20000);
    return;
  }

  // Otherwise use GPS
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      findNearestStop(lat, lon, destinationKey);

      refreshInterval = setInterval(() => {
        findNearestStop(lat, lon, destinationKey);
      }, 20000);
    },
    () => {
      document.getElementById("results").innerHTML = "Location permission required.";
    }
  );
}

function findNearestStop(lat, lon, destinationKey) {
  const url = `https://corsproxy.io/?${encodeURIComponent(
    `https://api.translink.ca/rttiapi/v1/stops?apikey=${API_KEY}&lat=${lat}&long=${lon}&radius=500`
  )}`;

  fetch(url)
    .then(res => res.text())
    .then(str => (new window.DOMParser()).parseFromString(str, "text/xml"))
    .then(data => {
      const stops = data.getElementsByTagName("Stop");

      if (stops.length === 0) {
        document.getElementById("results").innerHTML = "No nearby stops found.";
        return;
      }

      const stopId = stops[0].getElementsByTagName("StopNo")[0].textContent;
      fetchBuses(stopId, destinationKey);
    })
    .catch(() => {
      document.getElementById("results").innerHTML = "Error finding stops.";
    });
}

function fetchBuses(stopId, destinationKey) {
  const url = `https://corsproxy.io/?${encodeURIComponent(
    `https://api.translink.ca/rttiapi/v1/stops/${stopId}/estimates?apikey=${API_KEY}&count=10&timeframe=60`
  )}`;

  fetch(url)
    .then(res => res.text())
    .then(str => (new window.DOMParser()).parseFromString(str, "text/xml"))
    .then(data => {
      const buses = data.getElementsByTagName("NextBus");
      const filter = DEST_FILTERS[destinationKey];

      let results = [];

      for (let bus of buses) {
        const route = bus.getElementsByTagName("RouteNo")[0].textContent;
        const dest = bus.getElementsByTagName("Destination")[0].textContent.toLowerCase();
        const mins = parseInt(bus.getElementsByTagName("ExpectedCountdown")[0].textContent);
        const direction = bus.getElementsByTagName("Direction")[0]?.textContent || "";

        const keywordMatch = filter.keywords.some(k => dest.includes(k));
        const directionMatch = filter.directions.includes(direction);

        if (keywordMatch && directionMatch) {
          results.push({ route, dest, mins });
        }
      }

      results.sort((a, b) => a.mins - b.mins);

      let output = results.map(b =>
        `<div class="bus">
          🚌 ${b.route} → ${b.dest}<br>
          <strong>${b.mins} min</strong>
        </div>`
      ).join("");

      document.getElementById("results").innerHTML =
        output || "No matching buses.";
    })
    .catch(() => {
      document.getElementById("results").innerHTML = "Error loading buses.";
    });
}
</script>

</body>
</html>
