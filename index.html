<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus Finder</title>
  <style>
    body { font-family: -apple-system; text-align: center; padding: 20px; }
    button {
      font-size: 18px;
      padding: 15px;
      margin: 10px;
      width: 90%;
    }
    .bus {
      margin-top: 15px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

<h2>Bus Finder</h2>

<button onclick="start('lougheed')">Lougheed Mall Bus Station</button>
<button onclick="start('burquitlam')">Burquitlam Station</button>
<button onclick="start('regent')">842 Regent St (Eastbound)</button>

<div id="results">Select a destination</div>

<script>
const API_KEY = "h2kQJcW1liXq6pSOQpLn";

// Destination filters
const DEST_FILTERS = {
  lougheed: {
    keywords: ["lougheed"],
    directions: ["W"]
  },
  burquitlam: {
    keywords: ["burquitlam"],
    directions: ["W", "N"]
  },
  regent: {
    keywords: [], // no keyword filtering
    directions: ["E"]
  }
};

// Fixed stop (Regent)
const FIXED_STOPS = {
  regent: "52813"
};

// Known stops (fallback system)
const KNOWN_STOPS = [
  { id: "52813", lat: 49.2663, lon: -122.8568 },
  { id: "52814", lat: 49.2663, lon: -122.8578 },
  { id: "52035", lat: 49.2620, lon: -122.8890 },
  { id: "51861", lat: 49.2485, lon: -122.8970 }
];

// Destination coordinates
const DEST_COORDS = {
  lougheed: { lat: 49.2485, lon: -122.8970 },
  burquitlam: { lat: 49.2625, lon: -122.8893 }
};

let refreshInterval = null;

function start(destinationKey) {
  clearInterval(refreshInterval);
  document.getElementById("results").innerHTML = "Loading...";

  if (FIXED_STOPS[destinationKey]) {
    fetchBuses(FIXED_STOPS[destinationKey], destinationKey);
    refreshInterval = setInterval(() => {
      fetchBuses(FIXED_STOPS[destinationKey], destinationKey);
    }, 20000);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      findNearestStop(lat, lon, destinationKey);

      refreshInterval = setInterval(() => {
        findNearestStop(lat, lon, destinationKey);
      }, 20000);
    },
    () => {
      document.getElementById("results").innerHTML = "Location permission required.";
    }
  );
}

// Known-stop selection with side bias
function findNearestStop(lat, lon, destinationKey) {
  const dest = DEST_COORDS[destinationKey];

  let bestStopId = null;
  let bestScore = Infinity;

  for (let stop of KNOWN_STOPS) {
    const dist = distance(lat, lon, stop.lat, stop.lon);

    const dirScore = directionScore(lat, lon, stop.lat, stop.lon, dest.lat, dest.lon);

    const sidePenalty = dirScore < 0 ? 0.1 : 0;

    const score = dist + sidePenalty;

    if (score < bestScore) {
      bestScore = score;
      bestStopId = stop.id;
    }
  }

  if (!bestStopId) {
    document.getElementById("results").innerHTML = "No stops available.";
    return;
  }

  fetchBuses(bestStopId, destinationKey);
}

// Fetch buses (stable version)
function fetchBuses(stopId, destinationKey) {
  document.getElementById("results").innerHTML = "Loading buses...";

  const url = `https://translink-proxy.onrender.com/stops/${stopId}?apikey=${API_KEY}`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const filter = DEST_FILTERS[destinationKey];

      let results = [];

      for (let bus of data) {
        const route = bus.RouteNo;
        const dest = bus.Destination.toLowerCase();
        const mins = parseInt(bus.ExpectedCountdown);
        const direction = bus.Direction || "";

        const keywordMatch = filter.keywords.length === 0
          ? true
          : filter.keywords.some(k => dest.includes(k));

        const directionMatch = filter.directions.includes(direction);

        if (keywordMatch && directionMatch) {
          results.push({ route, dest, mins });
        }
      }

      results.sort((a, b) => a.mins - b.mins);

      let output = results.map(b =>
        `<div class="bus">
          🚌 ${b.route} → ${b.dest}<br>
          <strong>${b.mins} min</strong>
        </div>`
      ).join("");

      document.getElementById("results").innerHTML =
        output || "No matching buses.";
    })
    .catch(() => {
      document.getElementById("results").innerHTML =
        "Error loading buses.";
    });
}

// Helpers
function distance(lat1, lon1, lat2, lon2) {
  return Math.sqrt(
    Math.pow(lat1 - lat2, 2) +
    Math.pow(lon1 - lon2, 2)
  );
}

function directionScore(userLat, userLon, stopLat, stopLon, destLat, destLon) {
  const toStopX = stopLat - userLat;
  const toStopY = stopLon - userLon;

  const toDestX = destLat - userLat;
  const toDestY = destLon - userLon;

  return (toStopX * toDestX + toStopY * toDestY);
}
</script>

</body>
</html>
